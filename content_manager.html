<!DOCTYPE html>
<html lang="ar" dir="rtl">
<!--
  Content Manager — front-end only (no backend / no auth yet).
  Tabbed structure. For now only the "Modules" tab is implemented;
  the rest are Coming Soon. Data is stored in localStorage (academies.js).
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager · Sales Data</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ MOBILE TOP BAR ============ -->
  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">☰</button>
    <span class="topbar-logo">SD</span>
    <span class="topbar-title">Sales Data — Learning Center</span>
  </header>

  <div class="layout">

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">SD</div>
        <div class="brand-text">
          <strong>Sales Data</strong>
          <span>Learning Center</span>
        </div>
      </div>

      <nav class="nav" aria-label="Main">
        <a class="nav-item" href="index.html">
          <span class="nav-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h5v-6h4v6h5V9.5"/></svg>
          </span>
          <span class="nav-label">Learning Center</span>
        </a>
        <a class="nav-item" href="learning_path.html">
          <span class="nav-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="16" rx="2"/><path d="M9 5V4.2A1.2 1.2 0 0 1 10.2 3h3.6A1.2 1.2 0 0 1 15 4.2V5"/><path d="M9 11h6"/><path d="M9 15h4"/></svg>
          </span>
          <span class="nav-label">Learning Path</span>
        </a>
        <a class="nav-item active" href="content_manager.html">
          <span class="nav-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 20V9"/></svg>
          </span>
          <span class="nav-label">Content Manager</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <div class="foot-progress">
          <div class="foot-label">Overall Progress</div>
          <div class="progress-bar"><span style="width:0%"></span></div>
          <div class="foot-percent">0%</div>
        </div>
      </div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="content">

      <a class="back-link" href="learning_path.html" aria-label="Back to Learning Path">← Learning Path</a>

      <div class="page-head reveal">
        <h1>Content Manager</h1>
        <p class="muted">أنشئ وعدّل محتوى الأكاديميات من هنا. (نسخة أولية بدون Database)</p>
      </div>

      <!-- Tabs (only Modules is active for now) -->
      <div class="cm-tabs reveal" role="tablist" aria-label="Content Manager sections">
        <button class="cm-tab active" data-tab="modules" role="tab" aria-selected="true">Modules</button>
        <button class="cm-tab" disabled>Lessons / Content <span class="cm-soon">Soon</span></button>
        <button class="cm-tab" disabled>Assignments <span class="cm-soon">Soon</span></button>
        <button class="cm-tab" disabled>Resources <span class="cm-soon">Soon</span></button>
        <button class="cm-tab" disabled>Settings <span class="cm-soon">Soon</span></button>
      </div>

      <!-- ===== MODULES TAB ===== -->
      <section id="tab-modules" class="cm-tabpanel reveal">

        <form id="moduleForm" class="card">
          <h3 class="cm-group-title">Create / Edit Module</h3>
          <input type="hidden" id="mId" />
          <div class="form-grid">
            <div class="field">
              <label for="mAcademy">Academy / Team</label>
              <select id="mAcademy"></select>
            </div>
            <div class="field">
              <label for="mNumber">Module Number</label>
              <input type="text" id="mNumber" placeholder="0, 1, 2, 3" />
            </div>
            <div class="field">
              <label for="mTitle">Module Title</label>
              <input type="text" id="mTitle" placeholder="Entry Assessment" />
            </div>
            <div class="field field-full">
              <label for="mDesc">Short Description</label>
              <input type="text" id="mDesc" placeholder="جملة قصيرة توضح الموديول" />
            </div>
            <div class="field">
              <label for="mTime">Estimated Time</label>
              <input type="text" id="mTime" placeholder="30 min, 1 hour" />
            </div>
            <div class="field">
              <label for="mDiff">Difficulty</label>
              <select id="mDiff">
                <option value="Foundation">Foundation</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
              </select>
            </div>
            <div class="field">
              <label for="mStatus">Status</label>
              <select id="mStatus">
                <option value="Draft">Draft</option>
                <option value="Published">Published</option>
                <option value="Locked">Locked</option>
              </select>
            </div>
          </div>
          <div class="cm-form-actions">
            <button type="submit" class="btn btn-primary" id="mSaveBtn">Save Module</button>
            <button type="button" class="btn btn-ghost" id="mResetBtn" hidden>Cancel Edit</button>
            <span class="form-msg" id="mMsg" role="status" aria-live="polite"></span>
          </div>
        </form>

        <h3 class="cm-list-heading" id="mListHeading">Modules</h3>
        <div class="cm-list" id="moduleList"></div>

      </section>

    </main>
  </div>

  <script src="academies.js"></script>
  <script src="script.js"></script>
  <script src="content_manager.js"></script>
</body>
</html>
