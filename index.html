<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Center — Sales Division</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <script src="identity.js"></script>
</head>
<body>

  <!-- ============ TEAM SELECTION (Learning Center) ============ -->
  <!-- Future: connect team selection to permissions / role-based access -->
  <div class="entry">
    <div class="entry-wrap">
      <div class="entry-brand">
        <div class="brand-logo">SD</div>
        <div class="entry-brand-text">
          <strong>Learning Center</strong>
          <span>Sales Division</span>
        </div>
      </div>

      <!-- ===== Identification (first visit) ===== -->
      <div id="identifyView" hidden>
        <h1 class="entry-title">Welcome to the Learning Center</h1>
        <p class="entry-sub">Please identify yourself before starting your training.</p>

        <form id="identifyForm" class="identify-form" autocomplete="off">
          <div class="field">
            <label for="idName">Employee Name *</label>
            <input type="text" id="idName" list="empList" placeholder="اكتب اسمك · Your name" autocomplete="off" />
            <datalist id="empList"></datalist>
          </div>
          <div class="field">
            <label for="idTeam">Team *</label>
            <select id="idTeam">
              <option value="">Select team…</option>
              <option value="Sales">Sales</option>
              <option value="Sales Data">Sales Data</option>
              <option value="Sales Accounting">Sales Accounting</option>
            </select>
          </div>
          <div class="identify-actions">
            <button type="submit" class="btn btn-primary">Continue</button>
            <span class="form-msg" id="idMsg" role="status" aria-live="polite"></span>
          </div>
        </form>
      </div>

      <!-- ===== Team selection (after identification) ===== -->
      <div id="teamsView" hidden>
        <div class="entry-user" id="entryUser"></div>
        <h1 class="entry-title">Learning Center</h1>
        <p class="entry-sub">Select your team to open the correct training path.</p>

        <!-- Team cards are rendered data-driven from academies.js (one system, many academies) -->
        <div class="team-grid" id="teamGrid"></div>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="tracking.js?v=track-1"></script>
  <script src="academies.js"></script>
  <script src="script.js"></script>
</body>
</html>
